name: Package Trinetra Repository

on:
  push:
    branches:
      - agent/package-secure-settings
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create repository ZIP
        run: |
          zip -r Trinetra-secure-nessus-settings.zip . \
            -x '.git/*' \
            -x '.github/workflows/package-repository.yml'

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trinetra-secure-nessus-settings
          path: Trinetra-secure-nessus-settings.zip
          retention-days: 1
          if-no-files-found: error
